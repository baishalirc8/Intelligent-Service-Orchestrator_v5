    <script>
      // Patch window.WebSocket to silently absorb HMR connection failures
      // in Replit's proxied environment. Vite's @vite/client throws an
      // unhandled rejection when the socket closes before it opens — this
      // proxy intercepts exactly that event and swallows it so the runtime
      // error monitor never sees it.
      (function () {
        var OrigWS = window.WebSocket;
        function PatchedWS(url, protocols) {
          var ws = protocols ? new OrigWS(url, protocols) : new OrigWS(url);
          var opened = false;
          ws.addEventListener('open', function () { opened = true; });
          ws.addEventListener('close', function (ev) {
            if (!opened) {
              // Prevent the "WebSocket closed without opened" rejection by
              // stopping the close event before Vite's handler can throw.
              ev.stopImmediatePropagation();
            }
          }, true); // capture phase — runs before Vite's bubble-phase listener
          return ws;
        }
        PatchedWS.prototype = OrigWS.prototype;
        PatchedWS.CONNECTING = OrigWS.CONNECTING;
        PatchedWS.OPEN = OrigWS.OPEN;
        PatchedWS.CLOSING = OrigWS.CLOSING;
        PatchedWS.CLOSED = OrigWS.CLOSED;
        window.WebSocket = PatchedWS;

        // Belt-and-suspenders: also swallow the unhandledrejection if it
        // somehow still fires (e.g. from a different WS path).
        window.addEventListener('unhandledrejection', function (e) {
          var msg = (e.reason && e.reason.message) || '';
          if (msg.includes('WebSocket') || msg.includes('vite-hmr') || msg.includes('closed without')) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
        }, true);
      })();
    </script>
